# =============================================================================
# BUG REPORT TEMPLATE
# =============================================================================
# Local override for EFingPlanner (recorded in .template-sync/marker.yml): this
# is a printable, no-software Markdown curriculum, so the upstream software-bug
# form (OS / architecture / runtime versions / shell / run-commands) has been
# reshaped into a curriculum "something is wrong or broken" report. Upstream
# design decisions:
# https://github.com/franklesniak/copilot-repo-template/blob/HEAD/.github/TEMPLATE_DESIGN_DECISIONS.md
# =============================================================================

name: 🐛 Bug Report
description: Report a curriculum problem — something wrong, broken, or that doesn't work as intended
title: "[Bug] "
labels:
  - bug
  - triage
body:
  # NOTE: The Markdown links below use absolute URLs because relative paths
  # resolve against the rendering URL `/{owner}/{repo}/issues/new?...` and 404.
  # GHES users: Replace `github.com` with your GHES host (e.g., `github.company.com`).
  - type: markdown
    attributes:
      value: |
        ## Thanks for helping improve the curriculum!
        Use this form for a curriculum problem — a step that can't be completed, a
        wrong or confusing instruction, a broken cross-reference, a rendering or
        printing problem, or an accessibility barrier. For a plain typo, unclear
        wording, or a missing link, the 📚 Documentation Issue form fits better.

        **Security Notice:** If you are reporting a security vulnerability, do NOT use this form.
        Report it through the repository's
        [private vulnerability reporting form](https://github.com/franklesniak/EFingPlanner/security/advisories/new)
        after maintainers have enabled private vulnerability reporting in GitHub settings.
        If that form is unavailable, review
        [SECURITY.md](https://github.com/franklesniak/EFingPlanner/blob/HEAD/SECURITY.md).

  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: This is NOT a security vulnerability (report those using SECURITY.md or the private reporting form)
          required: true

  - type: textarea
    id: description
    attributes:
      label: What is the problem?
      description: Describe what is wrong, broken, or confusing.
      placeholder: e.g., The packing-list worksheet asks the child to copy a total from a page that isn't in the session.
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Where is it?
      description: >-
        Which session, worksheet, or page? A file path or a title/heading both work.
        Pointing to a location greatly speeds up a fix.
      placeholder: e.g., the "Destination snapshot" session, or framework/sessions/phase_02_destination_big_picture/10_destination_snapshot.md
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the curriculum does this affect?
      options:
        - A specific session / worksheet
        - Reference or destination pages (e.g., Japan)
        - Framework / how-to guidance
        - Accessibility (screen reader, print, dyslexia-friendly formatting)
        - The repository or site itself (links, rendering, GitHub)
        - Other (describe in Additional Context)
    validations:
      required: false

  - type: dropdown
    id: format
    attributes:
      label: How are you using it?
      description: Some problems only show up in one format.
      options:
        - Printed on paper
        - On screen (reading the Markdown on GitHub or the site)
        - In a document editor (e.g., Google Docs) after copying it in
        - Not sure / not applicable
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: What did you expect? (optional)
      description: What should the curriculum have said or done here?
      placeholder: What you expected...
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshot or photo (optional)
      description: >-
        A screenshot of the page, or a photo of the printed worksheet, helps a lot.
        Drag and drop images directly into this field.
      placeholder: Drag and drop images here...
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: How much does it get in the way?
      description: >-
        Your self-assessment; maintainers may adjust during triage.
      options:
        - Blocks a child from finishing the activity
        - Confusing or misleading, but workable
        - Minor (cosmetic, formatting, or a small wording problem)
    validations:
      required: true

  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested fix (optional)
      description: If you know how it should read or work, propose it here.
      placeholder: Describe a possible fix...
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context (optional)
      description: >-
        Anything else that would help — related issues, the child's context, etc.
      placeholder: Add any other context here...
    validations:
      required: false
